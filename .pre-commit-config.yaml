# Runs the project's own pinned tools via Poetry, so local hooks and CI
# stay in lock-step. Install with: poetry run pre-commit install
repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff (lint)
        entry: poetry run ruff check --fix
        language: system
        types: [python]
      - id: ruff-format
        name: ruff (format)
        entry: poetry run ruff format
        language: system
        types: [python]
      - id: mypy
        name: mypy
        entry: poetry run mypy src
        language: system
        pass_filenames: false
