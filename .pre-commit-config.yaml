# Runs the project's own pinned tools via Poetry, so local hooks and CI
# stay in lock-step. Install with: poetry run pre-commit install
repos:
  - repo: local
    hooks:
      - id: black
        name: black
        entry: poetry run black --line-length 79
        language: system
        types: [python]
      - id: flake8
        name: flake8
        entry: poetry run flake8
        language: system
        types: [python]
      - id: mypy
        name: mypy
        entry: poetry run mypy src
        language: system
        pass_filenames: false
